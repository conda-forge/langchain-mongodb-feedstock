schema_version: 1

context:
  name: langchain-mongodb
  version: "0.11.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/langchain_mongodb-${{ version }}.tar.gz
  sha256: db483f12e8a4fdbbcfb0594881962fd1f0afcb38a3d42ee0d5fe8a2be20e1e86

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - lark <2.0.0,>=1.1.9
    - python >=${{ python_min }}
    - pymongo >=4.6.1
    - pymongo-search-utils >=0.2.1
    - langchain-core >=1.2.5,<2.0
    - numpy >=1.26
    - langchain-classic >=1.0,<2.0
    - langchain-text-splitters >=1.0,<2.0

tests:
  - python:
      imports:
        - langchain_mongodb
      pip_check: false
      python_version: ${{ python_min }}

about:
  summary: An integration package connecting MongoDB and LangChain
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/langchain-ai/langchain

extra:
  recipe-maintainers:
    - jan-janssen
